audiences:
  ai_product_manager:
    label: "AI 产品经理"
    description: "关注产品机制、应用场景、用户价值和落地门槛的从业者。"
    focus:
      - "产品到底解决什么问题"
      - "核心能力和差异化在哪"
      - "能否复制到自己的业务场景"
    tone: "专业、务实、少空话"

  ai_builder:
    label: "AI 应用开发者"
    description: "关注工作流、能力边界、集成方式和工程细节的开发者。"
    focus:
      - "底层能力或工作流机制"
      - "适合什么技术栈和集成方式"
      - "现阶段的限制与风险"
    tone: "技术导向、解释清楚、不装腔作势"

  content_operator:
    label: "内容运营 / 自媒体作者"
    description: "关注选题价值、生产效率、复制路径和商业化机会的内容从业者。"
    focus:
      - "这件事为什么值得写"
      - "它怎样提升内容生产效率"
      - "能不能形成具体工作流"
    tone: "直接、实战、强调可复制性"

content_types:
  tool_review:
    label: "工具 / 产品解读"
    objective: "把产品是什么、能做什么、为什么值得关注讲清楚。"
    sections:
      - heading: "这是什么"
        purpose: "用一句话定义产品，再解释它解决的问题。"
      - heading: "核心能力拆解"
        purpose: "拆 3 到 5 个关键能力，说明每个能力的实际价值。"
      - heading: "机制与差异化"
        purpose: "解释它和常见 AI 助手或同类工具的区别，尽量写清产品机制。"
      - heading: "实战场景"
        purpose: "给出 2 到 3 个贴近工作流的使用场景。"
      - heading: "局限与建议"
        purpose: "说明现阶段限制、适用边界和采用建议。"
    emphasis:
      - "必须解释它和同类方案差在哪"
      - "优先写产品机制，不要只写功能列表"
      - "尽量给出工作流级别的使用方法"

  tutorial:
    label: "教程 / 工作流指南"
    objective: "把方法讲清楚，让读者知道怎么上手和怎么避坑。"
    sections:
      - heading: "先说结论"
        purpose: "直接告诉读者这套方法能解决什么问题。"
      - heading: "准备条件"
        purpose: "交代所需工具、前提和适用场景。"
      - heading: "分步实战"
        purpose: "按步骤讲清流程、操作和关键判断点。"
      - heading: "常见问题"
        purpose: "补充最容易踩坑的地方和解决建议。"
      - heading: "总结"
        purpose: "总结方法的边界、收益和下一步。"
    emphasis:
      - "每一步都要说明为什么这样做"
      - "必须让读者看完后可以照着执行"
      - "避免只给概念不给流程"

  technical_walkthrough:
    label: "技术实现拆解"
    objective: "按原文结构把系统设计、实现链路、代码职责和工程取舍讲清楚，让读者看完知道它到底是怎么搭出来的。"
    sections:
      - heading: "先讲系统要解决什么问题"
        purpose: "用一段话讲清楚目标问题、约束和为什么需要这套实现。"
      - heading: "系统结构与关键角色"
        purpose: "先交代组件、代理、数据流或模块分工，再进入细节。"
      - heading: "按链路拆解实现"
        purpose: "顺着原文步骤解释每一层是怎么串起来的，不要只给抽象结论。"
      - heading: "代码与工程细节"
        purpose: "概括关键代码片段、接口、状态流转和实现取舍。"
      - heading: "限制、风险与适用边界"
        purpose: "说明还没解决的问题、工程代价以及适合什么团队采用。"
    emphasis:
      - "优先沿用原文的章节顺序和实现链路"
      - "必须解释代码或伪代码在整条链路中的作用"
      - "不要把全文写成僵硬的价值/机制/场景模板文"

  industry_analysis:
    label: "行业动态分析"
    objective: "把事件、影响和行动建议讲清楚，而不是复述新闻。"
    sections:
      - heading: "发生了什么"
        purpose: "快速概括事件和关键信息。"
      - heading: "真正值得关注的点"
        purpose: "提炼 3 到 5 个高信息密度要点。"
      - heading: "对行业和从业者的影响"
        purpose: "分析具体影响，不要泛泛而谈。"
      - heading: "现在可以做什么"
        purpose: "给出可执行的跟进建议。"
      - heading: "总结判断"
        purpose: "形成清晰结论，指出短期和中期意义。"
    emphasis:
      - "不要只搬运新闻"
      - "要写清楚对读者的实际影响"
      - "允许指出不确定性，但不能无依据推测"

quality_requirements:
  must_have:
    - "开头第一段直接定义主题，不要用空泛背景开场"
    - "至少 3 条有信息密度的关键点"
    - "至少 2 个具体应用场景、工作流或判断依据"
    - "必须写出局限、风险或适用边界"
    - "结尾必须给出可执行建议"
  must_avoid:
    - "随着 AI 的发展、在当今时代、众所周知 等套话"
    - "赋能、颠覆、降本增效 等无事实支撑的大话"
    - "同义反复和段落灌水"
    - "没有依据的猜测和脑补"
    - "营销腔、标题党、夸张表达"
  best_practices:
    - "每个小节先给结论，再给解释"
    - "优先使用短句和明确判断"
    - "尽量把抽象描述改成具体机制或例子"
    - "如果信息不足，就明确写出不确定点"

writing_style:
  tone: "专业、克制、信息密度高"
  prefer:
    - "用一句话先下判断"
    - "多用具体名词和事实，少用抽象修饰"
    - "多写为什么，少写正确的废话"
    - "优先解释机制、流程和边界"
  paragraph_structure:
    - "每段 2 到 4 句"
    - "每个小节围绕一个核心意思展开"
    - "列表优先用于并列信息"

global_constraints:
  - "只能基于已提供的事实包写作，事实包没有的信息不要编造"
  - "如果某个判断属于推测，要明确写成推测"
  - "输出必须是简体中文 Markdown"
  - "不要添加“参考资料”“延伸阅读”之类的额外章节"
