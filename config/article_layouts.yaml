    use_lede: true
    max_width: "720px"
    page_background: "#f4f7fb"
    card_background: "#ffffff"
    border_color: "#dbe4f0"
    text_color: "#1f2937"
    muted_color: "#5b6474"
    accent_color: "#2563eb"
    heading_color: "#173355"
    code_background: "#0f172a"
    code_color: "#e2e8f0"
    quote_background: "#eff6ff"
    quote_border: "#93c5fd"
    table_header_background: "#eff6ff"
    font_family: "-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif"
    heading_font_family: "'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif"

  editorial_analysis:
